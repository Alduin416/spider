<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侘寂 - 百度热搜榜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Zen+Old+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Zen Old Mincho', 'Noto Serif JP', 'Microsoft YaHei', serif;
            background: #1a1a2e;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 神奈川冲浪里背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/images/great_wave.jpg') center center / cover no-repeat;
            opacity: 0.4;
            z-index: 0;
            filter: saturate(0.7) brightness(0.8);
        }

        /* 和纸纹理叠加 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(255, 248, 220, 0.03) 0px,
                    rgba(255, 248, 220, 0.03) 1px,
                    transparent 1px,
                    transparent 3px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 248, 220, 0.02) 0px,
                    rgba(255, 248, 220, 0.02) 1px,
                    transparent 1px,
                    transparent 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 160, 100, 0.3);
            border-radius: 2px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 248, 220, 0.1);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        /* 顶部装饰线 - 朱色 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #c84a3a 20%, 
                #d4a064 50%, 
                #c84a3a 80%, 
                transparent 100%
            );
        }

        .header {
            background: linear-gradient(180deg, 
                rgba(26, 26, 46, 0.95) 0%, 
                rgba(22, 33, 62, 0.9) 100%
            );
            padding: 50px 40px 40px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 160, 100, 0.2);
            position: relative;
        }

        /* 标题下方的装饰 */
        .header::after {
            content: '〜';
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(212, 160, 100, 0.4);
            font-size: 24px;
            letter-spacing: 20px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            color: #d4a064;
            text-shadow: 
                0 0 20px rgba(212, 160, 100, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 12px;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 14px;
            color: rgba(212, 160, 100, 0.6);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .refresh-btn {
            display: block;
            margin: 30px auto;
            padding: 14px 45px;
            background: transparent;
            color: #d4a064;
            border: 1px solid rgba(212, 160, 100, 0.4);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s ease;
            font-family: 'Zen Old Mincho', serif;
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
        }

        .refresh-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(212, 160, 100, 0.2), 
                transparent
            );
            transition: left 0.5s ease;
        }

        .refresh-btn:hover::before {
            left: 100%;
        }

        .refresh-btn:hover {
            border-color: #d4a064;
            box-shadow: 0 0 20px rgba(212, 160, 100, 0.3);
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .refresh-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .news-list {
            padding: 30px 40px;
        }

        .news-item {
            display: flex;
            align-items: center;
            padding: 22px 25px;
            margin-bottom: 18px;
            background: rgba(255, 248, 220, 0.03);
            border-left: 2px solid rgba(212, 160, 100, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 0;
            height: 100%;
            background: rgba(212, 160, 100, 0.08);
            transition: width 0.4s ease;
        }

        .news-item:hover::before {
            width: 100%;
        }

        .news-item:hover {
            border-left-color: #d4a064;
            box-shadow: 
                -4px 0 15px rgba(212, 160, 100, 0.15),
                0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .rank {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            margin-right: 22px;
            flex-shrink: 0;
            border: 1px solid rgba(212, 160, 100, 0.3);
            font-family: 'Zen Old Mincho', serif;
            color: #d4a064;
            position: relative;
            z-index: 1;
        }

        .rank-1 {
            background: rgba(200, 74, 58, 0.2);
            border-color: #c84a3a;
            color: #e8685a;
        }

        .rank-2 {
            background: rgba(212, 160, 100, 0.15);
            border-color: #d4a064;
        }

        .rank-3 {
            background: rgba(180, 140, 100, 0.15);
            border-color: #b48c64;
        }

        .rank-other {
            background: rgba(255, 248, 220, 0.05);
        }

        .news-content {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .news-title {
            font-size: 16px;
            color: #f0e6d2;
            margin-bottom: 10px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .news-hot {
            font-size: 11px;
            color: rgba(200, 74, 58, 0.8);
            background: rgba(200, 74, 58, 0.1);
            padding: 3px 10px;
            border: 1px solid rgba(200, 74, 58, 0.3);
            display: inline-block;
            letter-spacing: 2px;
        }

        .loading {
            text-align: center;
            padding: 70px 20px;
            color: #d4a064;
        }

        .loading-spinner {
            border: 2px solid rgba(212, 160, 100, 0.1);
            border-top: 2px solid #d4a064;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #c84a3a;
            background: rgba(200, 74, 58, 0.05);
            border: 1px solid rgba(200, 74, 58, 0.2);
            margin: 20px 40px;
        }

        .last-update {
            text-align: center;
            padding: 25px;
            color: rgba(212, 160, 100, 0.5);
            font-size: 12px;
            border-top: 1px solid rgba(212, 160, 100, 0.15);
            letter-spacing: 3px;
        }

        /* 页面导航 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 25px 40px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(212, 160, 100, 0.15);
        }

        .pagination a, .pagination span {
            display: inline-block;
            padding: 10px 16px;
            background: transparent;
            border: 1px solid rgba(212, 160, 100, 0.25);
            color: rgba(212, 160, 100, 0.6);
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'Zen Old Mincho', serif;
            font-size: 14px;
            min-width: 42px;
            text-align: center;
        }

        .pagination a:hover {
            border-color: #d4a064;
            color: #d4a064;
            background: rgba(212, 160, 100, 0.1);
        }

        .pagination .current {
            background: rgba(212, 160, 100, 0.2);
            color: #d4a064;
            border-color: #d4a064;
        }

        /* 验证码弹窗 - 侘寂风格 */
        .captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .captcha-overlay.hidden {
            display: none;
        }

        .captcha-modal {
            background: rgba(26, 26, 46, 0.95);
            padding: 50px;
            border: 1px solid rgba(212, 160, 100, 0.3);
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
        }

        /* 弹窗顶部装饰 */
        .captcha-modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                #d4a064, 
                transparent
            );
        }

        .captcha-icon {
            font-size: 60px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .captcha-modal h2 {
            color: #d4a064;
            margin-bottom: 15px;
            font-size: 28px;
            letter-spacing: 8px;
            font-weight: 600;
        }

        .captcha-modal p {
            color: rgba(212, 160, 100, 0.6);
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 3px;
        }

        .captcha-question {
            font-size: 32px;
            color: #f0e6d2;
            font-weight: 600;
            margin: 35px 0;
            padding: 25px;
            background: rgba(255, 248, 220, 0.03);
            border: 1px solid rgba(212, 160, 100, 0.2);
            letter-spacing: 6px;
            font-family: 'Zen Old Mincho', serif;
        }

        .captcha-input {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            border: 1px solid rgba(212, 160, 100, 0.3);
            background: rgba(255, 248, 220, 0.03);
            color: #f0e6d2;
            text-align: center;
            margin-bottom: 25px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Zen Old Mincho', serif;
            letter-spacing: 4px;
        }

        .captcha-input:focus {
            border-color: #d4a064;
            box-shadow: 0 0 15px rgba(212, 160, 100, 0.2);
        }

        .captcha-input::placeholder {
            color: rgba(212, 160, 100, 0.3);
        }

        .captcha-submit {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #d4a064;
            border: 1px solid rgba(212, 160, 100, 0.4);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Zen Old Mincho', serif;
            letter-spacing: 6px;
        }

        .captcha-submit:hover {
            background: rgba(212, 160, 100, 0.1);
            border-color: #d4a064;
            box-shadow: 0 0 20px rgba(212, 160, 100, 0.2);
        }

        .captcha-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .captcha-error {
            color: #c84a3a;
            margin-top: 18px;
            font-size: 13px;
            letter-spacing: 2px;
            min-height: 20px;
        }

        .captcha-success {
            color: #6a9c78;
            margin-top: 18px;
            font-size: 13px;
            letter-spacing: 2px;
            min-height: 20px;
        }

        .verified-badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(106, 156, 120, 0.15);
            color: #6a9c78;
            font-size: 11px;
            margin-left: 15px;
            border: 1px solid rgba(106, 156, 120, 0.4);
            letter-spacing: 4px;
            vertical-align: middle;
        }

        .verified-status {
            text-align: center;
            padding: 18px;
            background: rgba(106, 156, 120, 0.08);
            margin: 0 40px 20px;
            border: 1px solid rgba(106, 156, 120, 0.25);
            color: #6a9c78;
            letter-spacing: 4px;
            font-size: 13px;
        }

        /* 左下角高频词面板 - 侘寂风格 */
        .keywords-panel {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 260px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 160, 100, 0.25);
            z-index: 100;
            overflow: hidden;
        }

        .keywords-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                #d4a064, 
                transparent
            );
        }

        .keywords-header {
            background: rgba(212, 160, 100, 0.1);
            padding: 14px 18px;
            border-bottom: 1px solid rgba(212, 160, 100, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .keywords-title {
            color: #d4a064;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 4px;
        }

        .keywords-icon {
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(212, 160, 100, 0.6);
        }

        .keywords-icon:hover {
            color: #d4a064;
            transform: rotate(180deg);
        }

        .keywords-body {
            padding: 18px;
            max-height: 280px;
            overflow-y: auto;
        }

        .keywords-body::-webkit-scrollbar {
            width: 4px;
        }

        .keywords-body::-webkit-scrollbar-track {
            background: rgba(212, 160, 100, 0.05);
        }

        .keywords-body::-webkit-scrollbar-thumb {
            background: rgba(212, 160, 100, 0.3);
        }

        .keyword-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: rgba(255, 248, 220, 0.03);
            border-left: 2px solid rgba(212, 160, 100, 0.3);
            transition: all 0.3s ease;
        }

        .keyword-item:hover {
            border-left-color: #d4a064;
            background: rgba(212, 160, 100, 0.08);
        }

        .keyword-rank {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
            font-family: 'Zen Old Mincho', serif;
            border: 1px solid rgba(212, 160, 100, 0.3);
            color: #d4a064;
        }

        .keyword-rank-1 {
            background: rgba(200, 74, 58, 0.2);
            border-color: #c84a3a;
        }

        .keyword-rank-2 {
            background: rgba(212, 160, 100, 0.15);
        }

        .keyword-rank-3 {
            background: rgba(180, 140, 100, 0.15);
        }

        .keyword-rank-other {
            background: rgba(255, 248, 220, 0.05);
        }

        .keyword-word {
            flex: 1;
            color: #f0e6d2;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .keyword-count {
            color: rgba(212, 160, 100, 0.6);
            font-size: 11px;
            padding: 2px 8px;
            background: rgba(212, 160, 100, 0.1);
            border: 1px solid rgba(212, 160, 100, 0.2);
            font-family: 'Zen Old Mincho', serif;
        }

        .keywords-loading {
            text-align: center;
            padding: 30px 18px;
            color: rgba(212, 160, 100, 0.6);
            font-size: 12px;
            letter-spacing: 3px;
        }

        .keywords-spinner {
            border: 2px solid rgba(212, 160, 100, 0.1);
            border-top: 2px solid #d4a064;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        .keywords-error {
            text-align: center;
            padding: 20px 18px;
            color: #c84a3a;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* 左上角免责声明 */
        .disclaimer {
            position: fixed;
            top: 25px;
            left: 25px;
            color: rgba(212, 160, 100, 0.5);
            font-size: 12px;
            letter-spacing: 4px;
            z-index: 100;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /* 飘落的花瓣 - 更柔和 */
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(ellipse at center, 
                rgba(255, 183, 197, 0.6) 0%, 
                rgba(212, 160, 100, 0.4) 100%
            );
            border-radius: 50% 0 50% 0;
            animation: petalFall linear infinite;
            opacity: 0.5;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(50px);
                opacity: 0;
            }
        }

        /* 音乐按钮 */
        .music-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(212, 160, 100, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .music-btn:hover {
            border-color: #d4a064;
            box-shadow: 0 0 15px rgba(212, 160, 100, 0.2);
        }

        .music-btn.playing {
            border-color: #d4a064;
            background: rgba(212, 160, 100, 0.1);
        }

        .tomoe-svg {
            width: 28px;
            height: 28px;
            fill: rgba(212, 160, 100, 0.6);
        }

        .music-btn.playing .tomoe-svg {
            fill: #d4a064;
            animation: tomoeRotate 4s linear infinite;
        }

        @keyframes tomoeRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 右上角座右铭 */
        .motto-container {
            position: fixed;
            top: 25px;
            right: 90px;
            display: flex;
            gap: 25px;
            z-index: 100;
        }

        .motto-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 28px;
            color: rgba(212, 160, 100, 0.7);
            letter-spacing: 12px;
            text-shadow: 0 0 15px rgba(212, 160, 100, 0.3);
            font-family: '和风书道飞龙体', 'HWSHFeiLong', 'STKaiti', serif;
            padding: 15px 10px;
            border: 1px solid rgba(212, 160, 100, 0.2);
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .motto-text:hover {
            color: #d4a064;
            border-color: rgba(212, 160, 100, 0.5);
            box-shadow: 0 0 20px rgba(212, 160, 100, 0.2);
        }
    </style>
</head>
<body>
    <!-- 花瓣容器 -->
    <div class="petals-container" id="petalsContainer"></div>

    <!-- 左上角免责声明 -->
    <div class="disclaimer">仅供本人学习使用</div>

    <!-- 右上角座右铭 -->
    <div class="motto-container">
        <div class="motto-text">耐心</div>
        <div class="motto-text">忠义</div>
    </div>

    <!-- 音乐按钮 -->
    <button class="music-btn" id="musicBtn" onclick="toggleBGM()" title="播放/暂停背景音乐">
        <svg class="tomoe-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </button>

    <!-- 左下角高频词面板 -->
    <div class="keywords-panel" id="keywordsPanel" style="display: none;">
        <div class="keywords-header">
            <span class="keywords-title">🔥 高频关键词</span>
            <span class="keywords-icon" onclick="loadKeywords()" title="刷新">⟳</span>
        </div>
        <div class="keywords-body" id="keywordsBody">
            <div class="keywords-loading">
                <div class="keywords-spinner"></div>
                <p>正在分析热词...</p>
            </div>
        </div>
    </div>

    <!-- BGM 背景音乐 -->
    <audio id="bgm" loop>
        <source src="/static/Haggstrom-C418.mp3" type="audio/mpeg">
    </audio>

    <!-- 验证码弹窗 -->
    <div class="captcha-overlay" id="captchaOverlay">
        <div class="captcha-modal">
            <div class="captcha-icon">🎐</div>
            <h2>認証</h2>
            <p>数学の問題を解いてください</p>
            <div class="captcha-question" id="captchaQuestion">読み込み中...</div>
            <input type="number" class="captcha-input" id="captchaInput" placeholder="答えを入力" min="0" max="100">
            <button class="captcha-submit" id="captchaSubmit" onclick="verifyCaptcha()">確認</button>
            <div class="captcha-error" id="captchaError"></div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>侘寂<span id="verifiedBadge" style="display: none;">✓</span></h1>
            <p>わびさび · 百度熱搜</p>
        </div>

        <div class="verified-status" id="verifiedStatus" style="display: none;">
            ✓ 認証完了
        </div>

        <button class="refresh-btn" onclick="loadNews()" id="refreshBtn">
            更新
        </button>

        <div class="news-list" id="newsList">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>データを読み込んでいます...</p>
            </div>
        </div>

        <div class="last-update" id="lastUpdate"></div>

        <!-- 页面导航 -->
        <div class="pagination">
            <span style="opacity: 0.3; cursor: not-allowed;">« 前へ</span>

            {% for p in range(1, 11) %}
                {% if p == page_num %}
                <span class="current">{{ p }}</span>
                {% else %}
                <a href="/page/{{ p }}">{{ p }}</a>
                {% endif %}
            {% endfor %}

            <a href="/page/{{ page_num + 1 }}">次へ »</a>
        </div>
    </div>

    <script>
        let isVerified = {{ 'true' if verified else 'false' }};

        // BGM 音频控制
        let bgm = document.getElementById('bgm');
        let bgmPlaying = false;
        let musicBtn = document.getElementById('musicBtn');

        bgm.volume = 0.3;

        // 从 localStorage 恢复播放状态
        function restoreBGMState() {
            const savedState = localStorage.getItem('bgm_playing');
            const savedTime = localStorage.getItem('bgm_currentTime');
            
            if (savedState === 'true' && savedTime) {
                bgm.currentTime = parseFloat(savedTime);
                bgm.play().then(() => {
                    bgmPlaying = true;
                    musicBtn.classList.add('playing');
                }).catch(error => {
                    console.log('自动播放被阻止，需要用户交互:', error);
                });
            }
        }

        // 定期保存播放进度
        function saveBGMState() {
            if (bgmPlaying) {
                localStorage.setItem('bgm_playing', 'true');
                localStorage.setItem('bgm_currentTime', bgm.currentTime.toString());
            } else {
                localStorage.setItem('bgm_playing', 'false');
            }
        }

        // 每 500ms 保存一次进度
        setInterval(saveBGMState, 500);

        // 页面卸载时保存状态
        window.addEventListener('beforeunload', saveBGMState);

        // 页面加载时恢复状态
        window.addEventListener('load', restoreBGMState);

        function toggleBGM() {
            if (bgmPlaying) {
                bgm.pause();
                bgmPlaying = false;
                musicBtn.classList.remove('playing');
                localStorage.setItem('bgm_playing', 'false');
            } else {
                bgm.play().then(() => {
                    bgmPlaying = true;
                    musicBtn.classList.add('playing');
                    localStorage.setItem('bgm_playing', 'true');
                }).catch(error => {
                    console.log('播放失败:', error);
                });
            }
        }

        function tryPlayBGM() {
            if (!bgmPlaying) {
                bgm.play().then(() => {
                    bgmPlaying = true;
                    musicBtn.classList.add('playing');
                }).catch(error => {
                    console.log('等待用户交互后播放 BGM:', error);
                });
            }
        }

        // 创建花瓣
        function createPetals() {
            const container = document.getElementById('petalsContainer');
            const petalCount = 25;

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 6 + 8) + 's';
                petal.style.animationDelay = (Math.random() * 6) + 's';
                petal.style.width = (Math.random() * 6 + 6) + 'px';
                petal.style.height = petal.style.width;
                container.appendChild(petal);
            }
        }

        // 页面加载
        window.onload = function() {
            if (isVerified) {
                document.getElementById('captchaOverlay').classList.add('hidden');
                document.getElementById('verifiedBadge').style.display = 'inline-block';
                document.getElementById('verifiedStatus').style.display = 'block';
                loadNews();
                loadKeywords();
                createPetals();
                return;
            }
            const captchaQuestion = "{{ session.get('captcha_question', '') }}";
            if (captchaQuestion && captchaQuestion !== "None" && captchaQuestion !== "已验证") {
                document.getElementById('captchaQuestion').textContent = captchaQuestion;
            }
            createPetals();
            tryPlayBGM();
        };

        document.addEventListener('click', function() {
            tryPlayBGM();
        }, { once: true });

        document.addEventListener('keypress', function() {
            tryPlayBGM();
        }, { once: true });

        async function generateCaptcha() {
            try {
                const response = await fetch('/api/captcha/generate');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('captchaQuestion').textContent = data.question;
                    document.getElementById('captchaInput').value = '';
                    document.getElementById('captchaError').textContent = '';
                }
            } catch (error) {
                document.getElementById('captchaQuestion').textContent = 'エラー';
            }
        }

        async function verifyCaptcha() {
            const answer = document.getElementById('captchaInput').value;
            const submitBtn = document.getElementById('captchaSubmit');
            const errorDiv = document.getElementById('captchaError');

            if (!answer) {
                errorDiv.textContent = '入力してください';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '確認中...';

            try {
                const response = await fetch('/api/captcha/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answer: answer })
                });

                const data = await response.json();

                if (data.success) {
                    errorDiv.className = 'captcha-success';
                    errorDiv.textContent = '✓ 認証完了';
                    isVerified = true;

                    setTimeout(() => {
                        document.getElementById('captchaOverlay').classList.add('hidden');
                        document.getElementById('verifiedBadge').style.display = 'inline-block';
                        document.getElementById('verifiedStatus').style.display = 'block';
                        loadNews();
                        loadKeywords();
                    }, 1500);
                } else {
                    if (data.need_regenerate && data.question) {
                        document.getElementById('captchaQuestion').textContent = data.question;
                        document.getElementById('captchaInput').value = '';
                        errorDiv.textContent = data.message || '更新されました';
                    } else {
                        errorDiv.className = 'captcha-error';
                        errorDiv.textContent = data.message || '失敗';
                        setTimeout(() => {
                            generateCaptcha();
                        }, 1500);
                    }
                    submitBtn.disabled = false;
                    submitBtn.textContent = '確認';
                }
            } catch (error) {
                errorDiv.className = 'captcha-error';
                errorDiv.textContent = 'ネットワークエラー';
                submitBtn.disabled = false;
                submitBtn.textContent = '確認';
            }
        }

        document.getElementById('captchaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCaptcha();
            }
        });

        async function loadNews() {
            if (!isVerified) {
                document.getElementById('newsList').innerHTML = `
                    <div class="error">
                        <p>⚠️ 認証が必要です</p>
                    </div>
                `;
                return;
            }

            const newsList = document.getElementById('newsList');
            const refreshBtn = document.getElementById('refreshBtn');
            const lastUpdate = document.getElementById('lastUpdate');

            refreshBtn.disabled = true;
            newsList.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>データを読み込んでいます...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/news');
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    let html = '';
                    data.data.forEach((news, index) => {
                        const rank = index + 1;
                        html += `
                            <a href="${news.url}" target="_blank" class="news-item">
                                <div class="rank ${getRankClass(rank)}">${getRankDisplay(rank)}</div>
                                <div class="news-content">
                                    <div class="news-title">${news.title}</div>
                                    <span class="news-hot">🔥 ${news.hot || '注目'}</span>
                                </div>
                            </a>
                        `;
                    });
                    newsList.innerHTML = html;
                    lastUpdate.textContent = `更新: ${new Date().toLocaleString('zh-CN')}`;
                } else {
                    newsList.innerHTML = `
                        <div class="error">
                            <p>😢 ${data.message || '取得に失敗しました'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                newsList.innerHTML = `
                    <div class="error">
                        <p>😢 ネットワークエラー: ${error.message}</p>
                    </div>
                `;
            } finally {
                refreshBtn.disabled = false;
            }
        }

        function getRankClass(rank) {
            if (rank === 1) return 'rank-1';
            if (rank === 2) return 'rank-2';
            if (rank === 3) return 'rank-3';
            return 'rank-other';
        }

        function getRankDisplay(rank) {
            if (rank === 1) return '壱';
            if (rank === 2) return '弐';
            if (rank === 3) return '参';
            return rank;
        }

        async function loadKeywords() {
            if (!isVerified) return;

            const keywordsPanel = document.getElementById('keywordsPanel');
            const keywordsBody = document.getElementById('keywordsBody');

            keywordsPanel.style.display = 'block';
            keywordsBody.innerHTML = `
                <div class="keywords-loading">
                    <div class="keywords-spinner"></div>
                    <p>分析中...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/keywords');
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    let html = '';
                    data.data.forEach((item, index) => {
                        const rank = index + 1;
                        html += `
                            <div class="keyword-item">
                                <div class="keyword-rank ${getKeywordRankClass(rank)}">${rank}</div>
                                <span class="keyword-word">${item.keyword}</span>
                                <span class="keyword-count">${item.count}</span>
                            </div>
                        `;
                    });
                    keywordsBody.innerHTML = html;
                } else {
                    keywordsBody.innerHTML = `
                        <div class="keywords-error">
                            <p>😢 ${data.message || '抽出に失敗しました'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                keywordsBody.innerHTML = `
                    <div class="keywords-error">
                        <p>😢 ネットワークエラー: ${error.message}</p>
                    </div>
                `;
            }
        }

        function getKeywordRankClass(rank) {
            if (rank === 1) return 'keyword-rank-1';
            if (rank === 2) return 'keyword-rank-2';
            if (rank === 3) return 'keyword-rank-3';
            return 'keyword-rank-other';
        }
    </script>
</body>
</html>
